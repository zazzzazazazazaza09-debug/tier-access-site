<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tier Unlock</title>
  <link rel="stylesheet" href="/style.css?v=4" />
</head>

<body>
<canvas id="bgCanvas"></canvas>

<main class="app">
  <section class="entry-page">
    <div class="entry-card tier-card">

      <div class="badge" id="badge">TIER</div>

      <h1 id="title">Access Granted</h1>
      <p class="sub" id="subtitle">Loading tier...</p>

      <button class="main-btn" id="openBtn">
        OPEN TIER
      </button>

      <button class="ghost-btn" onclick="location.href='/'">
        BACK
      </button>

    </div>
  </section>
</main>

<script>
const tiers = {
  1: "https://mega.nz/folder/PUtj3DIb#n_wQW4wD8njQSdfXVQouPQ",
  2: "https://mega.nz/folder/X9BWiLoJ#Dtu36r2Bgsn8nGtyJYvfPQ",
  3: "https://mega.nz/folder/UUs33JwL#A-QboeebPQp-2kGr-6zWsw",
  4: "https://mega.nz/folder/qpAlFSiC#4A_h0goqIMV0UYPqIpBE1A",
  5: "https://mega.nz/folder/ycURWbQa#1nB1asXinsTSWe_JWDoQYQ",
  6: "https://mega.nz/folder/AysgBQYC#80bBtBc7yCN7vV_ThXuuZg"
};

// get tier from URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const tierId = parseInt(id);
const link = tiers[tierId];

if (!link) {
  document.getElementById("title").innerText = "Tier not found";
  document.getElementById("subtitle").innerText = "Invalid access link";
  document.getElementById("openBtn").style.display = "none";
} else {
  document.getElementById("badge").innerText = "TIER " + tierId;
  document.getElementById("subtitle").innerText = "Unlocked Tier " + tierId;

  document.getElementById("openBtn").onclick = () => {
    window.open(link, "_blank");
  };
}
</script>

<script src="/app.js?v=4"></script>
</body>
</html>
