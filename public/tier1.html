<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Preview Unlocked
  </title>

  <link
    rel="stylesheet"
    href="/style.css"
  />

</head>

<body>

<canvas id="bgCanvas"></canvas>

<main class="entry-page">

  <div class="entry-card tier1-card">

    <div class="badge">
      PREVIEW UNLOCKED
    </div>

    <!-- TOP BADGES -->

    <div
      style="
        display:flex;
        gap:10px;
        justify-content:center;
        flex-wrap:wrap;
        margin-bottom:18px;
      "
    >

      <div
        style="
          padding:8px 14px;
          border-radius:999px;
          background:rgba(0,255,156,.12);
          border:1px solid rgba(0,255,156,.2);
          color:#7dffbf;
          font-size:.85rem;
          font-weight:800;
        "
      >
        🔒 Secured Access
      </div>

      <div
        style="
          padding:8px 14px;
          border-radius:999px;
          background:rgba(0,245,255,.12);
          border:1px solid rgba(0,245,255,.2);
          color:#7eefff;
          font-size:.85rem;
          font-weight:800;
        "
      >
        👥 Used by 2.3k+ users
      </div>

    </div>

    <h1>
      Access Granted ✅
    </h1>

    <p class="sub">
      You unlocked the preview access.
    </p>

    <div class="notice">

      Preview content is now available below.

    </div>

    <!-- PREVIEW BUTTON -->

    <button

      class="main-btn"

      onclick="
        window.open(
          'https://mega.nz/folder/sdVzxS4Y#XyscuaNdRv6SOgBRq7zDww',
          '_blank'
        )
      "

    >

      OPEN PREVIEW

    </button>

    <!-- TELEGRAM -->

    <button

      class="ghost-btn"

      onclick="
        window.open(
          'https://t.me/Nonaxionbot',
          '_blank'
        )
      "

    >

      UNLOCK NEW TIERS HERE

    </button>

    <!-- BACK -->

    <button

      class="ghost-btn"

      onclick="
        location.href='/'
      "

    >

      BACK

    </button>

  </div>

</main>

<script>

const canvas =
  document.getElementById(
    "bgCanvas"
  );

const ctx =
  canvas.getContext("2d");

function resize(){

  canvas.width =
    innerWidth;

  canvas.height =
    innerHeight;

}

resize();

addEventListener(
  "resize",
  resize
);

let stars =
  Array.from(

    {length:130},

    () => ({

      x:
        Math.random()
        * canvas.width,

      y:
        Math.random()
        * canvas.height,

      r:
        Math.random()
        * 1.6,

      d:
        Math.random()
        * 0.75
        + 0.1

    })

  );

function animate(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle =
    "rgba(255,255,255,.75)";

  stars.forEach(s => {

    ctx.beginPath();

    ctx.arc(
      s.x,
      s.y,
      s.r,
      0,
      Math.PI*2
    );

    ctx.fill();

    s.y += s.d;

    if(
      s.y >
      canvas.height
    ){

      s.y = 0;

      s.x =
        Math.random()
        * canvas.width;

    }

  });

  requestAnimationFrame(
    animate
  );

}

animate();

</script>

</body>
</html>
