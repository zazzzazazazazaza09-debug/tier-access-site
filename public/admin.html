<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Nonaxion Access</title>
  <link rel="stylesheet" href="/style.css?v=10" />
</head>
<body>
<canvas id="bgCanvas" aria-hidden="true"></canvas>

<main class="app">
  <section id="adminLogin" class="entry-page">
    <div class="entry-card">
      <div class="badge">ADMIN</div>
      <h1>Admin Sign In</h1>
      <form id="adminLoginForm">
        <label>Username</label>
        <input id="adminUsername" autocomplete="username" />
        <label>Password</label>
        <input id="adminPassword" type="password" autocomplete="current-password" />
        <button class="main-btn" type="submit">Log in</button>
      </form>
      <div id="adminLoginMsg" class="msg"></div>
    </div>
  </section>

  <section id="adminPanel" class="hidden">
    <div class="topbar">
      <div class="topbar-title">Admin · Purchases</div>
      <div style="display:flex; gap:8px;">
        <button class="icon-btn icon-btn-ghost" type="button" id="goSite">SITE</button>
        <button class="icon-btn icon-btn-ghost" type="button" id="adminLogout" style="color:#ff8a9e">LOGOUT</button>
      </div>
    </div>

    <div class="admin-shell">
      <h1>Pending payments</h1>

      <div class="admin-tabs">
        <button data-view="dashboard">Dashboard</button>
        <button data-view="purchases" class="active">Purchases</button>
        <button data-view="orders">Custom orders</button>
        <button data-status="pending" class="purchase-tab active">Pending</button>
        <button data-status="approved" class="purchase-tab">Approved</button>
        <button data-status="rejected" class="purchase-tab">Rejected</button>
        <button data-status="all" class="purchase-tab">All</button>
        <button id="adminRefresh" style="margin-left:auto">🔄 Refresh</button>
      </div>

      <div id="adminMsg" class="msg"></div>

      <div id="dashboardView" class="hidden">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="stats-section">
          <h2>Signups (last 14 days)</h2>
          <div class="chart-wrap">
            <canvas id="signupsChart"></canvas>
          </div>
        </div>

        <div class="stats-section">
          <h2>Approved revenue (last 14 days)</h2>
          <div class="chart-wrap">
            <canvas id="revenueChart"></canvas>
          </div>
        </div>

        <div class="stats-section">
          <h2>Purchases by method</h2>
          <div class="chart-wrap chart-wrap-small">
            <canvas id="methodChart"></canvas>
          </div>
        </div>

        <div class="stats-section">
          <h2>Tier unlocks</h2>
          <div class="stats-grid" id="tierStatsGrid"></div>
        </div>
      </div>

      <div id="purchasesView">
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>User</th>
                <th>Product</th>
                <th>Method</th>
                <th>Amount</th>
                <th>Details</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminTbody"></tbody>
          </table>
        </div>
      </div>

      <div id="ordersView" class="hidden">
        <div id="adminOrdersList" class="admin-orders-list"></div>
        <div id="adminChatPanel" class="admin-chat-panel hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px">
            <h3 id="adminChatTitle" style="margin:0">Conversation</h3>
            <button type="button" id="adminCloseOrderBtn" class="ghost-mini" style="color:#ff8a9e;border-color:rgba(255,138,158,.35);flex-shrink:0">🔒 Close conversation</button>
          </div>
          <div id="adminChatMessages" class="chat-messages"></div>
          <div class="admin-price-row">
            <span id="adminAgreedPrice" class="muted">No price set yet</span>
            <input id="adminPriceInput" type="number" min="1" max="10000" placeholder="Price ($)" style="width:120px" />
            <button type="button" class="ghost-mini" id="adminSetPriceBtn">Set Price</button>
            <div id="adminPriceMsg" class="msg" style="flex:100%;margin-top:4px"></div>
          </div>
          <div class="chat-input-row">
            <input id="adminChatInput" placeholder="Reply to user…" maxlength="2000" />
            <button type="button" class="main-btn chat-send-btn" id="adminChatSend">Send</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/tiers.config.js?v=10"></script>
<script src="/admin.js?v=11"></script>
</body>
</html>
